    <div id="jsStatus" class="jsStatus jsStatus--hidden"></div>

    <main class="discussionPage">
      <section
        class="discussionComposer card"
        data-i18n-aria-label="ariaDiscussionComposer"
        aria-label="Create discussion post"
      >
        <h1 data-i18n="discussionBoardTitle">Discussion board</h1>
        <p class="muted" data-i18n="discussionIntro">Share reflections, add context, and reply to others.</p>
        <p id="discussionBackendNote" class="muted small discussionBackendNote" hidden></p>
        <div class="field">
          <label for="discussionTitle" data-i18n="discussionTitleLabel">Title</label>
          <input
            id="discussionTitle"
            type="text"
            maxlength="120"
            data-i18n-placeholder="discussionTitlePlaceholder"
            placeholder="Post title"
          />
        </div>
        <div class="field">
          <label for="discussionDescription" data-i18n="discussionDescLabel">Description</label>
          <textarea
            id="discussionDescription"
            rows="4"
            data-i18n-placeholder="discussionDescPlaceholder"
            placeholder="Write your post"
          ></textarea>
        </div>
        <div class="actions">
          <button id="discussionPostBtn" class="btn" type="button" data-i18n="discussionPost">Post</button>
        </div>
      </section>

      <section class="discussionFeed" data-i18n-aria-label="ariaDiscussionFeed" aria-label="Discussion posts">
        <div id="discussionPosts"></div>
      </section>
    </main>

      </a>
      <button id="btnLogin" class="footerLoginBtn" type="button" data-i18n="footerLogin">Login</button>
    </div>

    <div id="loginModal" class="loginModal" aria-hidden="true">
      <div class="loginModal__backdrop"></div>
      <div class="loginModal__panel" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
        <h2 id="loginTitle" class="loginModal__title" data-i18n="loginModalTitle">Admin login</h2>
        <p class="muted small" data-i18n="loginModalHint">Enter password to unlock admin mode.</p>
        <div class="field">
          <label for="adminPassword" data-i18n="loginPasswordLabel">Password</label>
          <input id="adminPassword" type="password" autocomplete="current-password" />
        </div>
        <p id="loginError" class="loginModal__error" aria-live="polite"></p>
        <div class="actions actions--row">
          <button id="btnCancelLogin" class="btn btn--secondary" type="button" data-i18n="loginCancel">Cancel</button>
          <button id="btnSubmitLogin" class="btn" type="button" data-i18n="loginUnlock">Unlock</button>
        </div>
      </div>
    </div>
