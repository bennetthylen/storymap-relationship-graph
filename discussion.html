<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discussion - "Doing Well, Don't Worry"</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-mode="discussion" id="top">
    <nav class="siteNav" aria-label="Primary navigation">
      <a href="./index.html#home" class="siteNav__brand">Doing Well, Don't Worry</a>
      <div class="siteNav__tabs">
        <a href="./index.html#home" class="siteNav__tab">Home</a>
        <a href="./storymap.html" class="siteNav__tab">StoryMap</a>
        <a href="./history.html" class="siteNav__tab">History</a>
        <a href="./discussion.html" class="siteNav__tab siteNav__tab--active">Discussion</a>
        <label class="siteNav__tab siteNav__tab--label" for="langSelect">Language</label>
        <select id="langSelect" class="siteNav__langSelect" aria-label="Language">
          <option value="en">English</option>
        </select>
      </div>
    </nav>

    <div id="jsStatus" class="jsStatus jsStatus--hidden"></div>

    <main class="discussionPage">
      <section class="discussionComposer card" aria-label="Create discussion post">
        <h1>Discussion Board</h1>
        <p class="muted">Share reflections, add context, and reply to others.</p>
        <p id="discussionBackendNote" class="muted small discussionBackendNote" hidden></p>
        <div class="field">
          <label for="discussionTitle">Title</label>
          <input id="discussionTitle" type="text" maxlength="120" placeholder="Post title" />
        </div>
        <div class="field">
          <label for="discussionDescription">Description</label>
          <textarea id="discussionDescription" rows="4" placeholder="Write your post"></textarea>
        </div>
        <div class="actions">
          <button id="discussionPostBtn" class="btn" type="button">Post</button>
        </div>
      </section>

      <section class="discussionFeed" aria-label="Discussion posts">
        <div id="discussionPosts"></div>
      </section>
    </main>

    <div class="stickyFooterLinks">
      <a href="https://sfs.georgetown.edu/" target="_blank" rel="noopener noreferrer">Georgetown SFS</a>
      <a href="https://wmf.org.eg/en/" target="_blank" rel="noopener noreferrer">The Women and Memory Forum</a>
      <a href="mailto:tbh36@georgetown.edu">Contact Us</a>
      <button id="btnLogin" class="footerLoginBtn" type="button">Login</button>
    </div>

    <div id="loginModal" class="loginModal" aria-hidden="true">
      <div class="loginModal__backdrop"></div>
      <div class="loginModal__panel" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
        <h2 id="loginTitle" class="loginModal__title">Admin Login</h2>
        <p class="muted small">Enter password to unlock admin mode.</p>
        <div class="field">
          <label for="adminPassword">Password</label>
          <input id="adminPassword" type="password" autocomplete="current-password" />
        </div>
        <p id="loginError" class="loginModal__error" aria-live="polite"></p>
        <div class="actions actions--row">
          <button id="btnCancelLogin" class="btn btn--secondary" type="button">Cancel</button>
          <button id="btnSubmitLogin" class="btn" type="button">Unlock</button>
        </div>
      </div>
    </div>

    <script src="./discussion-config.js"></script>
    <script src="./app.js?v=20260331l"></script>
  </body>
</html>
