<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Storymap Relationship Graph</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./storymap.css" />
  </head>
  <body data-mode="viewer" id="top">
    <nav class="siteNav" aria-label="Primary navigation">
      <a href="./index.html#home" class="siteNav__brand">Doing Well, Don't Worry</a>
      <div class="siteNav__tabs">
        <a href="./index.html#home" class="siteNav__tab">Home</a>
        <a href="./storymap.html" class="siteNav__tab siteNav__tab--active">StoryMap</a>
        <a href="./history.html" class="siteNav__tab">History</a>
        <a href="./discussion.html" class="siteNav__tab">Discussion</a>
        <label class="siteNav__tab siteNav__tab--label" for="langSelect">Language</label>
        <select id="langSelect" class="siteNav__langSelect" aria-label="Language">
          <option value="en">English</option>
        </select>
      </div>
    </nav>

    <div id="jsStatus" class="jsStatus jsStatus--loading">Loading storymap...</div>
    <noscript>
      <div class="jsStatus jsStatus--error">JavaScript is required to run this app.</div>
    </noscript>

    <main class="storymapLayout">
      <section id="storymapCanvasPanel" class="storymapCanvasPanel" aria-label="Storymap canvas">
        <div class="mapControls" aria-label="Zoom controls">
          <button id="smZoomIn" class="mapControls__btn" type="button" aria-label="Zoom in">+</button>
          <button id="smZoomOut" class="mapControls__btn" type="button" aria-label="Zoom out">-</button>
        </div>
        <div id="storymapViewport" class="storymapViewport">
          <div id="storymapWorld" class="storymapWorld">
            <svg id="storymapEdges" class="storymapEdges" aria-hidden="true"></svg>
            <div id="storymapNodes" class="storymapNodes"></div>
          </div>
        </div>
        <aside id="smInfoPanel" class="smInfoPanel" aria-hidden="true">
          <button id="smInfoClose" class="smInfoClose" type="button" aria-label="Close node info">X</button>
          <h3 id="smInfoTitle"></h3>
          <img id="smInfoImage" class="smInfoImage" alt="" />
          <p id="smInfoBody"></p>
        </aside>
      </section>
    </main>

    <div class="stickyFooterLinks">
      <a href="https://sfs.georgetown.edu/" target="_blank" rel="noopener noreferrer">Georgetown SFS</a>
      <a href="https://wmf.org.eg/en/" target="_blank" rel="noopener noreferrer">The Women and Memory Forum</a>
      <a href="mailto:tbh36@georgetown.edu">Contact Us</a>
      <button id="btnLogin" class="footerLoginBtn" type="button">Login</button>
    </div>

    <div id="loginModal" class="loginModal" aria-hidden="true">
      <div class="loginModal__backdrop"></div>
      <div class="loginModal__panel" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
        <h2 id="loginTitle" class="loginModal__title">Admin Login</h2>
        <p class="muted small">Enter password to unlock admin mode.</p>
        <div class="field">
          <label for="adminPassword">Password</label>
          <input id="adminPassword" type="password" autocomplete="current-password" />
        </div>
        <p id="loginError" class="loginModal__error" aria-live="polite"></p>
        <div class="actions actions--row">
          <button id="btnCancelLogin" class="btn btn--secondary" type="button">Cancel</button>
          <button id="btnSubmitLogin" class="btn" type="button">Unlock</button>
        </div>
      </div>
    </div>

    <script src="./app.js?v=20260331e"></script>
  </body>
</html>
