<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Storymap Relationship Graph</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./storymap.css" />
  </head>
  <body data-mode="viewer" id="top">
    <nav class="siteNav" data-i18n-aria-label="navAriaPrimary" aria-label="Primary navigation">
      <a href="./index.html#home" class="siteNav__brand" data-i18n="siteBrand">Doing Well, Don't Worry</a>
      <div class="siteNav__tabs">
        <a href="./index.html#home" class="siteNav__tab" data-i18n="navHome">Home</a>
        <a href="./storymap.html" class="siteNav__tab siteNav__tab--active" data-i18n="navStorymap">StoryMap</a>
        <a href="./history.html" class="siteNav__tab" data-i18n="navHistory">History</a>
        <a href="./discussion.html" class="siteNav__tab" data-i18n="navDiscussion">Discussion</a>
        <div class="siteNav__lang">
          <button
            type="button"
            class="siteNav__langBtn"
            id="langMenuBtn"
            aria-haspopup="listbox"
            aria-expanded="false"
            aria-controls="langMenuList"
            data-i18n-aria-label="langButtonAria"
            aria-label="Languages"
          >
            <span id="langCurrentLabel">EN</span>
          </button>
          <ul
            id="langMenuList"
            class="siteNav__langMenu"
            role="listbox"
            data-i18n-aria-label="langMenuAria"
            aria-label="Choose language"
          >
            <li role="none">
              <button type="button" class="siteNav__langOption" role="option" data-lang="en" aria-selected="true">
                English
              </button>
            </li>
            <li role="none">
              <button type="button" class="siteNav__langOption" role="option" data-lang="ar" aria-selected="false">
                العربية الفصحى
              </button>
            </li>
            <li role="none">
              <button type="button" class="siteNav__langOption" role="option" data-lang="it" aria-selected="false">
                Italiano
              </button>
            </li>
            <li role="none">
              <button type="button" class="siteNav__langOption" role="option" data-lang="fr" aria-selected="false">
                Français
              </button>
            </li>
            <li role="none">
              <button type="button" class="siteNav__langOption" role="option" data-lang="es" aria-selected="false">
                Español
              </button>
            </li>
            <li role="none">
              <button type="button" class="siteNav__langOption" role="option" data-lang="de" aria-selected="false">
                Deutsch
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div id="jsStatus" class="jsStatus jsStatus--loading" data-i18n="statusLoadingStorymap">Loading storymap…</div>
    <noscript>
      <div class="jsStatus jsStatus--error" data-i18n="statusJsRequired">JavaScript is required to run this app.</div>
    </noscript>

    <main class="storymapLayout">
      <section
        id="storymapCanvasPanel"
        class="storymapCanvasPanel"
        data-i18n-aria-label="ariaStorymapCanvas"
        aria-label="Storymap canvas"
      >
        <div class="mapControls" data-i18n-aria-label="ariaZoomControls" aria-label="Zoom controls">
          <button
            id="smZoomIn"
            class="mapControls__btn"
            type="button"
            data-i18n-aria-label="ariaZoomIn"
            aria-label="Zoom in"
          >
            +
          </button>
          <button
            id="smZoomOut"
            class="mapControls__btn"
            type="button"
            data-i18n-aria-label="ariaZoomOut"
            aria-label="Zoom out"
          >
            -
          </button>
        </div>
        <div id="storymapViewport" class="storymapViewport">
          <div id="storymapWorld" class="storymapWorld">
            <svg id="storymapEdges" class="storymapEdges" aria-hidden="true"></svg>
            <div id="storymapNodes" class="storymapNodes"></div>
          </div>
        </div>
        <aside id="smInfoPanel" class="smInfoPanel" aria-hidden="true">
          <button
            id="smInfoClose"
            class="smInfoClose"
            type="button"
            data-i18n-aria-label="ariaCloseNodeInfo"
            aria-label="Close node info"
          >
            X
          </button>
          <div class="smInfoPanel__inner">
            <div id="smInfoMediaWrap" class="smInfoPanel__media" hidden>
              <img id="smInfoImage" class="smInfoImage" alt="" />
            </div>
            <div class="smInfoPanel__copy">
              <h3 id="smInfoTitle" class="smInfoTitle"></h3>
              <p id="smInfoBody" class="smInfoBody"></p>
            </div>
          </div>
        </aside>
      </section>
    </main>

    <div class="stickyFooterLinks">
      <a href="https://sfs.georgetown.edu/" target="_blank" rel="noopener noreferrer" data-i18n="footerGeorgetownSfs"
        >Georgetown SFS</a
      >
      <a href="https://wmf.org.eg/en/" target="_blank" rel="noopener noreferrer" data-i18n="footerWmf"
        >The Women and Memory Forum</a
      >
      <a href="mailto:tbh36@georgetown.edu" data-i18n="footerContact">Contact us</a>
      <button id="btnLogin" class="footerLoginBtn" type="button" data-i18n="footerLogin">Login</button>
    </div>

    <div id="loginModal" class="loginModal" aria-hidden="true">
      <div class="loginModal__backdrop"></div>
      <div class="loginModal__panel" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
        <h2 id="loginTitle" class="loginModal__title" data-i18n="loginModalTitle">Admin login</h2>
        <p class="muted small" data-i18n="loginModalHint">Enter password to unlock admin mode.</p>
        <div class="field">
          <label for="adminPassword" data-i18n="loginPasswordLabel">Password</label>
          <input id="adminPassword" type="password" autocomplete="current-password" />
        </div>
        <p id="loginError" class="loginModal__error" aria-live="polite"></p>
        <div class="actions actions--row">
          <button id="btnCancelLogin" class="btn btn--secondary" type="button" data-i18n="loginCancel">Cancel</button>
          <button id="btnSubmitLogin" class="btn" type="button" data-i18n="loginUnlock">Unlock</button>
        </div>
      </div>
    </div>

    <script src="./site-i18n.js"></script>
    <script src="./app.js?v=20260331l"></script>
  </body>
</html>
