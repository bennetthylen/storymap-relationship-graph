<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Storymap Relationship Graph</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-mode="viewer">
    <div class="cornerHeader" aria-label="Header">
      Doing Fine, Don’t Worry
    </div>

    <div class="cornerControls" aria-label="Top right controls">
      <div class="langButtons" role="group" aria-label="Language">
        <button id="btnLangAr" class="langBtn" data-lang="ar" type="button">العربية</button>
        <button id="btnLangEn" class="langBtn" data-lang="en" type="button">English</button>
        <button id="btnLangEs" class="langBtn" data-lang="es" type="button">Español</button>
        <button id="btnLangFr" class="langBtn" data-lang="fr" type="button">Français</button>
        <button id="btnLangDe" class="langBtn" data-lang="de" type="button">Deutsch</button>
      </div>
    </div>

    <div id="jsStatus" class="jsStatus jsStatus--loading">
      Loading storymap...
    </div>
    <noscript>
      <div class="jsStatus jsStatus--error">JavaScript is required to run this app.</div>
    </noscript>

    <main id="viewerRoot" class="viewer">
      <aside id="viewerSidebar" class="viewerSidebar" aria-hidden="true">
        <button id="btnCloseSidebar" class="viewerSidebar__close" type="button" aria-label="Close sidebar">X</button>
        <div class="viewerSidebar__content">
          <img id="sidebarThumb" class="viewerSidebar__thumb" alt="" />
          <h3 id="sidebarTitle" class="viewerSidebar__title"></h3>
          <p id="sidebarMeta" class="muted small"></p>
          <p id="sidebarDescription" class="viewerSidebar__desc"></p>
        </div>
      </aside>

      <section class="mapArea">
        <div class="mapControls" aria-label="Zoom controls">
          <button id="btnZoomIn" class="mapControls__btn" type="button" aria-label="Zoom in">+</button>
          <button id="btnZoomOut" class="mapControls__btn" type="button" aria-label="Zoom out">-</button>
        </div>
        <div id="cy" class="cy cy--viewer" aria-label="Storymap">
          <div class="cyFallback">Loading map...</div>
        </div>
      </section>
    </main>

    <button id="btnLogin" class="loginBtn" type="button">Login</button>

    <div id="nodeModal" class="modal" aria-hidden="true">
      <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="nodeModalTitle">
        <div class="modal__header">
          <div class="modal__titleWrap">
            <h2 id="nodeModalTitle" class="modal__title">Node</h2>
            <p id="nodeModalMeta" class="modal__meta muted small"></p>
          </div>
          <button id="btnCloseNodeModal" class="btn btn--secondary modal__close" type="button" aria-label="Close details">X</button>
        </div>
        <div class="modal__body">
          <p id="nodeModalDescription" class="modal__desc"></p>
          <img id="nodeModalImage" class="modal__img" alt="" />
        </div>
        <div class="modal__footer">
          <button id="btnPrevNode" class="btn btn--secondary" type="button">Prev</button>
          <button id="btnNextNode" class="btn" type="button">Next</button>
        </div>
      </div>
    </div>

    <div id="loginModal" class="loginModal" aria-hidden="true">
      <div class="loginModal__backdrop"></div>
      <div class="loginModal__panel" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
        <h2 id="loginTitle" class="loginModal__title">Admin Login</h2>
        <p class="muted small">Enter password to unlock admin mode.</p>
        <div class="field">
          <label for="adminPassword">Password</label>
          <input id="adminPassword" type="password" autocomplete="current-password" />
        </div>
        <p id="loginError" class="loginModal__error" aria-live="polite"></p>
        <div class="actions actions--row">
          <button id="btnCancelLogin" class="btn btn--secondary" type="button">Cancel</button>
          <button id="btnSubmitLogin" class="btn" type="button">Unlock</button>
        </div>
      </div>
    </div>

    <script src="./vendor/cytoscape.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
